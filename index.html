<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نعاون - نظام إدارة المخالفات</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #D4AF37;
            --dark-gold: #AA8C2C;
            --bg-color: #F8F9FA;
            --card-bg: #FFFFFF;
            --text-main: #333333;
            --border-radius: 16px;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: var(--primary-gold);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            background-color: transparent;
            border: 2px solid var(--primary-gold);
            color: var(--primary-gold);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .tab-btn.active, .tab-btn:hover {
            background-color: var(--primary-gold);
            color: white;
        }

        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: var(--border-radius);
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border: 1px solid rgba(212, 175, 55, 0.2);
            display: none;
        }

        .card.active {
            display: block;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: inherit;
            transition: 0.3s;
        }

        input:focus, textarea:focus {
            border-color: var(--primary-gold);
            outline: none;
            box-shadow: 0 0 5px rgba(212, 175, 55, 0.3);
        }

        .btn-submit {
            background-color: var(--primary-gold);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: var(--dark-gold);
        }

        .stats-box {
            background: rgba(212, 175, 55, 0.1);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid var(--primary-gold);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: right;
        }

        th {
            background-color: var(--primary-gold);
            color: white;
        }

        .loading {
            display: none;
            text-align: center;
            color: var(--primary-gold);
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>نعاون لخدمات التوصيل</h1>
        <p>النظام الإداري الموحد - قسم المخالفات</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('formTab')">تسجيل مخالفة</button>
        <button class="tab-btn" onclick="switchTab('reportTab'); fetchStats();">التقارير والإحصائيات</button>
    </div>

    <div id="formTab" class="card active">
        <form id="violationForm">
            <div class="form-group">
                <label>اسم المندوب</label>
                <input type="text" id="captainName" required placeholder="أدخل اسم المندوب">
            </div>
            <div class="form-group">
                <label>رقم هاتف المندوب (8 أرقام فقط)</label>
                <input type="tel" id="captainPhone" required pattern="[0-9]{8}" placeholder="مثال: 9XXXXXXX">
            </div>
            <div class="form-group">
                <label>تاريخ المخالفة</label>
                <input type="date" id="violationDate" required>
            </div>
            <div class="form-group">
                <label>نوع / بيانات المخالفة</label>
                <input type="text" id="violationDetails" required placeholder="اشرح تفاصيل المخالفة">
            </div>
            <div class="form-group">
                <label>مبلغ الغرامة (ريال عماني)</label>
                <input type="number" step="0.1" id="fineAmount" required placeholder="مثال: 5.0">
            </div>
            <div class="form-group">
                <label>إرفاق صور (اختياري - يمكنك تحديد أكثر من صورة)</label>
                <input type="file" id="violationImage" accept="image/*" multiple>
            </div>
            <div class="form-group">
                <label>ملاحظات إضافية (اختياري)</label>
                <textarea id="notes" rows="3" placeholder="أي تفاصيل أخرى..."></textarea>
            </div>
            
            <button type="submit" class="btn-submit">تسجيل وإرسال إشعار للمندوب</button>
            <div id="formLoading" class="loading">جاري معالجة البيانات وإرسال الرسالة... الرجاء الانتظار.</div>
        </form>
    </div>

    <div id="reportTab" class="card">
        <div id="reportContent">
            <div class="header">
                <h2>تقرير المخالفات الرسمي - نعاون</h2>
            </div>
            <div class="stats-box">
                <h3>أكثر مندوب مخالف 🚨</h3>
                <h2 id="topViolatorName" style="color: red;">جاري التحميل...</h2>
                <p>بعدد: <span id="topViolatorCount">0</span> مخالفات</p>
            </div>

            <table id="statsTable">
                <thead>
                    <tr>
                        <th>اسم المندوب</th>
                        <th>عدد المخالفات</th>
                        <th>إجمالي الغرامات</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </div>
        <button class="btn-submit" onclick="generatePDF()" style="margin-top: 20px;">استخراج التقرير PDF</button>
        <div id="reportLoading" class="loading" style="display:block;">جاري جلب البيانات من الخادم...</div>
    </div>

</div>

<script>
    // ضع رابط الـ Web App الخاص بـ Google Apps Script هنا
    const GAS_URL = "ضع_رابط_سكربت_جوجل_هنا";

    // التنقل بين النوافذ
    function switchTab(tabId) {
        document.querySelectorAll('.card').forEach(card => card.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.target.classList.add('active');
    }

    // إرسال البيانات
    document.getElementById('violationForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const phone = document.getElementById('captainPhone').value;
        if(phone.length !== 8) {
            alert("الرجاء إدخال رقم هاتف مكون من 8 أرقام فقط.");
            return;
        }

        document.getElementById('formLoading').style.display = 'block';
        document.querySelector('.btn-submit').disabled = true;

        const fileInput = document.getElementById('violationImage');
        let imagesArray = [];

        if (fileInput.files.length > 0) {
            for (let i = 0; i < fileInput.files.length; i++) {
                let file = fileInput.files[i];
                let base64 = await getBase64(file);
                imagesArray.push({
                    base64: base64.split(',')[1],
                    mimeType: file.type,
                    filename: file.name
                });
            }
        }

        const payload = {
            action: "addViolation",
            name: document.getElementById('captainName').value,
            phone: phone,
            date: document.getElementById('violationDate').value,
            details: document.getElementById('violationDetails').value,
            fine: document.getElementById('fineAmount').value,
            notes: document.getElementById('notes').value,
            images: imagesArray
        };

        try {
            const response = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            const result = await response.json();
            
            if(result.status === 'success') {
                alert("تم التسجيل بنجاح وإرسال الإشعار (والصور إن وجدت) عبر UltraMsg!");
                document.getElementById('violationForm').reset();
            } else {
                alert("حدث خطأ: " + result.message);
            }
        } catch (error) {
            alert("خطأ في الاتصال بالخادم. يرجى التحقق من الرابط أو الاتصال بالإنترنت.");
        } finally {
            document.getElementById('formLoading').style.display = 'none';
            document.querySelector('.btn-submit').disabled = false;
        }
    });

    // جلب الإحصائيات للتقرير
    async function fetchStats() {
        document.getElementById('reportLoading').style.display = 'block';
        try {
            const response = await fetch(GAS_URL + "?action=getStats");
            const data = await response.json();
            
            const tbody = document.querySelector('#statsTable tbody');
            tbody.innerHTML = '';
            
            let topViolator = { name: "لا يوجد", count: 0 };

            for (const [name, stats] of Object.entries(data.captains)) {
                if(stats.count > topViolator.count) {
                    topViolator = { name: name, count: stats.count };
                }
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${name}</td><td>${stats.count}</td><td>${stats.totalFines} ر.ع</td>`;
                tbody.appendChild(tr);
            }

            document.getElementById('topViolatorName').innerText = topViolator.name;
            document.getElementById('topViolatorCount').innerText = topViolator.count;
            
        } catch (error) {
            console.error(error);
            alert("فشل جلب الإحصائيات.");
        } finally {
            document.getElementById('reportLoading').style.display = 'none';
        }
    }

    // استخراج PDF باحترافية
    function generatePDF() {
        const element = document.getElementById('reportContent');
        const opt = {
            margin:       10,
            filename:     'تقرير_مخالفات_نعاون.pdf',
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2 },
            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
            pagebreak:    { mode: 'avoid-all' }
        };
        html2pdf().set(opt).from(element).save();
    }

    // دالة مساعدة لتحويل الصورة
    function getBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });
    }
</script>

</body>
</html>
